name: Deploy backend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf "%s" "$SERVER_SSH_KEY" > ~/.ssh/beze_backend_deploy
          chmod 600 ~/.ssh/beze_backend_deploy

          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

          ssh -T -i ~/.ssh/beze_backend_deploy "$SERVER_USER@$SERVER_HOST" << 'EOF'
            set -euo pipefail

            cd ~/apps/beze-backend

            git fetch origin master
            git reset --hard origin/master

            docker compose -f docker-compose.prod.yml up -d postgres

            docker compose -f docker-compose.prod.yml build --pull backend

            docker compose -f docker-compose.prod.yml run --rm --no-deps backend uv run alembic upgrade head

            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend

            docker image prune -f
          EOF